services:
  # Nginx代理服务，使用OpenResty 1.29.2.3，支持HTTP/3和Brotli
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: poetize-nginx
    mem_limit: ${NGINX_MEMORY_LIMIT:-192m}
    mem_reservation: ${NGINX_MEMORY_RESERVATION:-128m}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - poetize_web_dist:/usr/share/nginx/html/poetize
      - poetize_admin_dist:/usr/share/nginx/html/admin
      - poetize_uploads:/usr/share/nginx/html/uploads
      - ./docker/nginx/enable-https.sh:/enable-https.sh
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - web-root:/usr/share/nginx/html
      - ./docker/nginx/lua:/etc/nginx/lua
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "${HTTP_PORT:-80}:80/tcp"
      - "${HTTPS_PORT:-443}:443/tcp"
      - "${HTTPS_PORT:-443}:443/udp"
    networks:
      poetize-network:
        ipv4_address: ${IP_NGINX:-172.28.147.2}
    depends_on:
      poetize-web:
        condition: service_completed_successfully
      poetize-admin:
        condition: service_completed_successfully
      java-backend:
        condition: service_healthy
    restart: always

  # 主站前端+聊天室（Vue 3）
  poetize-web:
    build:
      context: .
      dockerfile: docker/poetize-web/Dockerfile
      args:
        # AES加密密钥
        - VUE_APP_POETIZE_AES_KEY=${POETIZE_AES_KEY:-sarasarasarasara}
        # 生产模式(反调试、混淆、日志移除)
        - VUE_APP_PRODUCTION_MODE=true
        # 版本号
        - VITE_APP_VERSION=${APP_VERSION:-dev}
    container_name: poetize-web
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - poetize_web_dist:/app/dist
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      poetize-network:
        ipv4_address: ${IP_WEB:-172.28.147.3}
    restart: "no"

  # 后台管理前端（Vue 2）
  poetize-admin:
    build:
      context: .
      dockerfile: docker/poetize-admin/Dockerfile
      args:
        - VUE_APP_POETIZE_AES_KEY=${POETIZE_AES_KEY:-sarasarasarasara}
        - VUE_APP_PRODUCTION_MODE=true
        - VITE_APP_VERSION=${APP_VERSION:-dev}
    container_name: poetize-admin
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - poetize_admin_dist:/app/dist
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      poetize-network:
        ipv4_address: ${IP_ADMIN:-172.28.147.12}
    restart: "no"

  certbot:
    image: certbot/certbot
    container_name: poetize-certbot
    init: true  # 改善信号处理，确保优雅关闭
    mem_limit: ${CERTBOT_MEMORY_LIMIT:-128m}
    mem_reservation: ${CERTBOT_MEMORY_RESERVATION:-64m}
    profiles:
      - https
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - web-root:/usr/share/nginx/html
      - ./docker/nginx/certbot-logs:/var/log/letsencrypt
      - ./docker/nginx/certbot-entrypoint.sh:/certbot-entrypoint.sh
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      poetize-network:
        ipv4_address: ${IP_CERTBOT:-172.28.147.5}
    depends_on:
      - nginx
    restart: "no"
    entrypoint: []
    command: sh /certbot-entrypoint.sh

  # # Ollama翻译模型服务
  # translation-model:
  #   build:
  #     context: .
  #     dockerfile: docker/translation_model/Dockerfile
  #   container_name: poetize-translation-model
  #   environment:
  #     - TZ=Asia/Shanghai
  #     - OLLAMA_HOST=0.0.0.0:11434
  #     - OLLAMA_ORIGINS=*
  #     - OLLAMA_MODELS=qwen3:0.6b
  #     - OLLAMA_KEEP_ALIVE=-1
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #     - /etc/localtime:/etc/localtime:ro
  #     - /etc/timezone:/etc/timezone:ro
  #   networks:
  #     poetize-network:
  #       ipv4_address: ${IP_MODEL: 172.28.147.11}
  #   restart: always
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
  #     interval: 60s
  #     timeout: 30s
  #     retries: 3
  #     start_period: 1200s

  java-backend:
    build:
      context: .
      dockerfile: docker/java/Dockerfile
      args:
        - CN_FONT_SPLIT_GH_HOST=${CN_FONT_SPLIT_GH_HOST:-}
    container_name: poetize-java
    mem_limit: ${JAVA_MEMORY_LIMIT:-1536m}
    mem_reservation: ${JAVA_MEMORY_RESERVATION:-1024m}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - poetize_uploads:/app/static
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TZ=Asia/Shanghai
      # Java配置
      - JAVA_OPTS=${JAVA_OPTS:--Xmx1024m -Xms512m -XX:MaxMetaspaceSize=256m -XX:CompressedClassSpaceSize=128m -Xss512k -XX:+UseZGC -XX:+UnlockExperimentalVMOptions -XX:+ExitOnOutOfMemoryError -XX:MaxRAMPercentage=80.0 -XX:+DisableExplicitGC -XX:ReservedCodeCacheSize=128m -XX:MaxDirectMemorySize=192m -XX:ZUncommitDelay=120 -XX:CICompilerCount=2}
      # 数据库配置
      - SPRING_DATASOURCE_URL=jdbc:${DB_TYPE:-mariadb}://${DB_HOST:-mysql}:${DB_PORT:-3306}/${DB_NAME:-poetize}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-poetize}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-poetize123}
      # 数据库驱动类名
      - DB_TYPE=${DB_TYPE:-mariadb}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=${DB_DRIVER_CLASS:-org.mariadb.jdbc.Driver}
      - RAG_ENABLED=${RAG_ENABLED:-true}
      - SERVER_PORT=8081
      # AES加密密钥，需与前端一致
      - POETIZE_AES_KEY=${POETIZE_AES_KEY:-sarasarasarasara}
      - PRERENDER_URL=http://poetize-prerender:4000/render
      - PRERENDER_PAGES_URL=http://poetize-prerender:4000/render/pages
      - SITE_URL=${SITE_URL:-http://localhost}
      # 容器网络网段，用于判断请求是否为内网服务的请求
      - DOCKER_SUBNET=${DOCKER_SUBNET:-172.28.147.0/28}
      # Redis配置
      - SPRING_REDIS_HOST=${REDIS_HOST:-redis}
      - SPRING_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD:-poetize_redis_2025}
      - SPRING_REDIS_DATABASE=${REDIS_DB:-0}
      - SPRING_REDIS_TIMEOUT=3000
      - SPRING_REDIS_LETTUCE_POOL_MAX_ACTIVE=20
      - SPRING_REDIS_LETTUCE_POOL_MAX_IDLE=10
      - SPRING_REDIS_LETTUCE_POOL_MIN_IDLE=5
      # Token安全配置
      - TOKEN_SECRET_KEY=${TOKEN_SECRET_KEY:-your_super_secure_random_key_here_at_least_32_chars}
      # OAuth代理配置
      - OAUTH_PROXY_DOMAIN=${OAUTH_PROXY_DOMAIN:-}
      # Druid连接池配置
      - SPRING_DATASOURCE_DRUID_INITIAL_SIZE=${DRUID_INITIAL_SIZE:-5}
      - SPRING_DATASOURCE_DRUID_MIN_IDLE=${DRUID_MIN_IDLE:-5}
      - SPRING_DATASOURCE_DRUID_MAX_ACTIVE=${DRUID_MAX_ACTIVE:-64}
    networks:
      poetize-network:
        ipv4_address: ${IP_JAVA:-172.28.147.7}
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
      poetize-web:
        condition: service_completed_successfully
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis缓存服务
  redis:
    profiles:
      - redis
    image: redis:7-alpine
    container_name: poetize-redis
    init: true  # 改善信号处理，确保优雅关闭
    mem_limit: ${REDIS_MEMORY_LIMIT:-256m}
    mem_reservation: ${REDIS_MEMORY_RESERVATION:-128m}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      poetize-network:
        ipv4_address: ${IP_REDIS:-172.28.147.10}
    restart: always
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD:-poetize_redis_2025}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "poetize_redis_2025", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MariaDB服务
  mysql:
    profiles:
      - mysql
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    container_name: poetize-mariadb
    init: true  # 改善信号处理，确保优雅关闭
    mem_limit: ${MYSQL_MEMORY_LIMIT:-896m}
    mem_reservation: ${MYSQL_MEMORY_RESERVATION:-640m}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/conf/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TZ=Asia/Shanghai
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root123}
      - MARIADB_DATABASE=${DB_NAME:-poetize}
      - MARIADB_USER=${DB_USER:-poetize}
      - MARIADB_PASSWORD=${DB_PASSWORD:-poetize123}
    networks:
      poetize-network:
        ipv4_address: ${IP_MYSQL:-172.28.147.8}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u poetize -p${DB_PASSWORD:-poetize123} && echo 'SHOW ENGINES' | mariadb -h localhost -u poetize -p${DB_PASSWORD:-poetize123} | grep -q 'ROCKSDB'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  prerender-worker:
    build:
      context: ./docker/prerender
      dockerfile: Dockerfile
    container_name: poetize-prerender
    mem_limit: ${PRERENDER_MEMORY_LIMIT:-256m}
    mem_reservation: ${PRERENDER_MEMORY_RESERVATION:-128m}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - TZ=Asia/Shanghai
      - PORT=4000
      - LOG_LEVEL=info
      - PRERENDER_BASE_URL=http://nginx
      - PRERENDER_OUTPUT=/app/dist/prerender
      - JAVA_BACKEND_URL=http://poetize-java:8081
      - SITE_URL=${SITE_URL:-http://localhost}
      - NODE_ENV=production
    volumes:
      # 从 volume 读取前端构建产物，写入预渲染结果
      - poetize_web_dist:/app/dist
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      poetize-network:
        ipv4_address: ${IP_PRERENDER:-172.28.147.9}
    depends_on:
      nginx:
        condition: service_started
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  poetize-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${DOCKER_SUBNET:-172.28.147.0/28}
          gateway: ${DOCKER_GATEWAY:-172.28.147.1}
          ip_range: ${DOCKER_SUBNET:-172.28.147.0/28}

volumes:
  mysql_data:
  redis_data:
  certbot-etc:
  certbot-var:
  web-root:
  poetize_web_dist:
  poetize_admin_dist:
  poetize_uploads:
  ollama_data:
